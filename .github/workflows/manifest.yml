# Regenerate manifest.json on every push to main and commit it back.
# (Generated by the marketplace-flow skill, git path. Dogfoods cc-marketspec's
# own north-star: CI regenerates the manifest with zero manual steps.)
#
# Downstream marketplaces use `npx @xbluesky/cc-marketspec` here — the exact
# command the skill's template ships. THIS repo cannot: it *is*
# @xbluesky/cc-marketspec, so npx resolves the local package (same name) and
# runs its un-built ./dist, failing with `cc-marketspec: not found` (exit 127).
# So this repo builds from source and runs its own CLI. The npx template stays
# correct for everyone else — this is the one self-host special case.
name: Manifest

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Produce: build from source, then regenerate manifest.json from
      # catalog.yaml + entry.yaml + native data with this repo's own CLI.
      # (Downstream uses `npx @xbluesky/cc-marketspec`; see header for why this
      # repo can't.)
      - run: npm ci --registry=https://registry.npmjs.org
      - run: npm run build
      - run: node dist/cli.js
      # Persist (git path): commit the regenerated manifest back to the repo.
      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "chore: regenerate manifest [skip ci]"
          git push
