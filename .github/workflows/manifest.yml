# Regenerate manifest.json on every push to main and commit it back.
# (Generated by the marketplace-flow skill, git path. Dogfoods cc-marketspec's
# own north-star: CI regenerates the manifest with zero manual steps. Uses the
# published npx entrypoint — the exact command downstream marketplaces copy.)
name: Manifest

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Produce: regenerate manifest.json from catalog.yaml + entry.yaml + native data.
      - run: npx @xbluesky/cc-marketspec
      # Persist (git path): commit the regenerated manifest back to the repo.
      - name: Commit manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet || git commit -m "chore: regenerate manifest [skip ci]"
          git push
