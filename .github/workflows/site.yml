# Build the manifest showcase site on every PR and push to main. Build failure
# blocks merge — a broken site means the manifest has something the site can't
# render. Deploy is NOT here: Cloudflare Pages' Git integration owns deploy
# (separation of concerns, mirrors how deploy-worker is the only deploy in ci.yml).
name: Site

on:
  push:
    branches: [main]
  pull_request:

jobs:
  site-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Main lib deps (the site's build runs ../dist/cli.js to regenerate the
      # manifest). Pin the public registry — same lockfile/private-mirror reason
      # as ci.yml's validate job.
      - run: npm ci --registry=https://registry.npmjs.org
      # Site deps + build (build script regenerates the manifest, then astro build).
      - run: npm install --registry=https://registry.npmjs.org
        working-directory: site
      - run: npm run build
        working-directory: site
      - name: Verify site build output
        run: test -f site/dist/index.html
